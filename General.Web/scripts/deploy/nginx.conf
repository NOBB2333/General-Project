
# =============================================================
# 参考模板 —— 不是实际运行的 Nginx 配置文件
# 服务器上已配好 Nginx 则无需改动。此文件仅供参考或重建时使用。
#
# 生产部署架构：
#   浏览器 → Nginx :8094 → 静态文件（前端）
#                        → /api/* 代理 → 后端 :5007
#
# 关键配置说明：
#   location /api/  proxy_pass 地址即后端地址
#   若前后端在不同服务器，只需将 127.0.0.1:5007 改为后端服务器 IP:端口
# =============================================================

#user  nobody;
worker_processes 1;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
  worker_connections 1024;
}


http {
  include mime.types;
  default_type application/octet-stream;

  types {
    application/javascript  js mjs;
    text/css                css;
    text/html               html;
  }

  sendfile on;
  # tcp_nopush     on;

  #keepalive_timeout  0;
  # keepalive_timeout 65;

  # gzip on;
  # gzip_buffers 32 16k;
  # gzip_comp_level 6;
  # gzip_min_length 1k;
  # gzip_static on;
  # gzip_types text/plain
  #   text/css
  #   application/javascript
  #   application/json
  #   application/x-javascript
  #   text/xml
  #   application/xml
  #   application/xml+rss
  #   text/javascript; #设置压缩的文件类型
  # gzip_vary on;

  server {
    listen 8094;
    server_name localhost;

    # 前端静态文件
    location / {
      root /home/wong/Desktop/Code/CsharpLang/General-Project/web-general;
      try_files $uri $uri/ /index.html;
      index index.html;
    }

    # API 反向代理 → 后端 5007
    # 若后端迁移至其他服务器，只需修改此处 proxy_pass 地址
    location /api/ {
      proxy_pass         http://127.0.0.1:5007/api/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 120s;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
      root html;
    }
  }
}
